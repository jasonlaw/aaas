# Custom settings merged into Hermes's config.yaml by install.sh, then
# deleted. Edit or delete this file (before running install.sh) if you want
# different out-of-the-box behavior.
#
# - A key with a value here overwrites/merges that key in config.yaml.
# - A commented-out top-level key (e.g. "#provider:") comments out that
#   whole section in config.yaml instead of merging it.
# - If this file doesn't exist at install time, config.yaml is left exactly
#   as Hermes generated it.
#
# The path below is substituted by install.sh with the actual platform
# directory (${AAAS_ROOT}/platform by default) after this file is synced
# onto the target host — it's the one value that can't be known ahead of
# time since AAAS_ROOT is configurable.

skills:
  external_dirs:
    - __PLATFORM_DIR__/.opencode/skills

# Mnemosyne is the sole memory provider. memory_enabled and user_profile_enabled
# are set to false to suppress MEMORY.md and USER.md from the system prompt —
# Mnemosyne replaces them entirely. This is safe: when memory_enabled is false
# the built-in flat-file store is gone but all Mnemosyne tools still work, because
# the memory toolset gate (agent_init.py:1163-1172) is controlled separately by
# `hermes tools enable/disable memory` — NOT by this config key.
# Do NOT run `hermes tools disable memory` — that kills Mnemosyne tools too.
memory:
  memory_enabled: false
  user_profile_enabled: false
  provider: mnemosyne
  mnemosyne:
    profile_isolation: false

# Left for `hermes setup` to configure interactively.
#provider:
#model: